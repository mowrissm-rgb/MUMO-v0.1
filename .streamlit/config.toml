# MUMO ships a cinematic dark theme (#0c0c0c canvas, cyan accent, looping
# video background + liquid-glass surfaces). The app canvas is set transparent
# in mumo_chat.py so the background video shows through; these values drive
# widget theming (inputs, tables, menus).

[theme]
base = "dark"
primaryColor = "#3fc6d8"             # cyan accent (buttons, focus, highlights)
backgroundColor = "#0c0c0c"          # main canvas — cinematic near-black
secondaryBackgroundColor = "#16181d" # sidebar + widgets
textColor = "#e9edf2"                # cool off-white
font = "sans serif"

[server]
headless = true
port = 8501

[browser]
gatherUsageStats = false
