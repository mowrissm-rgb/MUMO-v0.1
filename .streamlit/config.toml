# MUMO ships a clean true light theme (near-white canvas, deep-teal accent).
# these values drive widget theming (inputs, tables, menus); mumo_chat.py's
# own CSS block layers the rest of the look on top.

[theme]
base = "light"
primaryColor = "#0f9aad"             # deep teal accent (buttons, focus, highlights)
backgroundColor = "#f7f8fa"          # main canvas — near-white
secondaryBackgroundColor = "#ffffff" # sidebar + widgets
textColor = "#1a1f26"                # near-black
font = "sans serif"

[server]
headless = true
port = 8501

[browser]
gatherUsageStats = false
